<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>주소 검색</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #wrap { width: 100%; height: 100%; overflow: hidden; }
    #error {
      display: none; position: fixed; inset: 0;
      justify-content: center; align-items: center;
      flex-direction: column; gap: 12px;
      font-family: sans-serif; font-size: 14px; color: #555; text-align: center; padding: 24px;
    }
  </style>
</head>
<body>
  <div id="wrap"></div>
  <div id="error">
    <p>주소 검색 서비스를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</p>
    <button onclick="location.reload()" style="padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">새로고침</button>
  </div>
  <script>
    function initPostcode() {
      var el = document.getElementById('wrap');
      if (!el || !window.daum || !window.daum.Postcode) {
        showError(); return;
      }
      new daum.Postcode({
        oncomplete: function (data) {
          var addr = data.addressType === 'R' ? data.roadAddress : data.jibunAddress;
          var msg = { type: 'ADDRESS_SELECTED', zipcode: data.zonecode, address: addr };
          if (window.opener) {
            window.opener.postMessage(msg, '*');
            window.close();
          } else {
            window.parent.postMessage(msg, '*');
          }
        },
        width: '100%',
        height: '100%'
      }).embed(el);
    }
    function showError() {
      document.getElementById('error').style.display = 'flex';
    }
  </script>
  <script
    src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"
    onload="initPostcode()"
    onerror="showError()"
  ></script>
</body>
</html>
